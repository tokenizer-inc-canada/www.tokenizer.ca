baseURL = "https://www.tokenizer.ca/"
languageCode = "en-us"
title = "Tokenizer Inc., Canada"
themesDir = "themes"
theme = "hugo-hero-theme"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.92.0"

[params]
  google_analytics_id=""

  [params.logo]
    mobile = "logo/tokenizer_logo_small.png"
    mobile_height = "36px"
    mobile_width = "36px"
    desktop = "logo/tokenizer_logo.png"
    desktop_height = "29px"
    desktop_width = "217px"
    alt = "Hugo Hero"

  [params.homepage_meta_tags]
    meta_description = "Tokenizer Inc. is a Canadian company providing consulting services and commercial support for Apache Lucene/Solr, Elasticsearch, Big Data, NoSQL, Enterprise Web, Mobile, and Desktop Software Engineering, and more."
    meta_og_title = "Hugo Hero Theme"
    meta_og_type = "website"
    meta_og_url = "https://hugo-hero.netlify.app"
    meta_og_image = "https://raw.githubusercontent.com/JugglerX/hugo-hero-theme/master/images/tn.png"
    meta_og_description = "Tokenizer Inc. is a Canadian company providing consulting services and commercial support for Apache Lucene/Solr, Elasticsearch, Big Data, NoSQL, Enterprise Web, Mobile, and Desktop Software Engineering, and more."
    meta_twitter_card = "summary"
    meta_twitter_site = "@zerostaticio"
    meta_twitter_creator = "@zerostaticio"

[[menu.main]]
	name = "Services"
	url = "/services/"
    weight = 1

[[menu.main]]
    name = "Work"
    url = "/work/"
    weight = 2

[[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[[menu.main]]
    name = "History"
    url = "/history/"
    weight = 3

[[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4

[permalinks]
  post = "/:year/:month/:day/:slug/"
  pages = "/:filename/"
